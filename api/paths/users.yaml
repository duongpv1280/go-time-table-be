get:
  summary: Get list of users
  operationId: listUsers
  tags:
    - users
  parameters:
    - name: page
      in: query
      required: false
      schema:
        type: integer
    - name: perPage
      in: query
      required: false
      schema:
        type: integer
  responses:
    '200':
      description: List of users retrieved successfully
      content:
        application/json:
          schema:
            $ref: '../schemas/list-users-response.yaml'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'

post:
  summary: Create a new user
  operationId: createUser
  tags:
    - users
  requestBody:
    $ref: '../requestBodies/create-user.yaml'
  responses:
    '201':
      description: User created successfully
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml'
    '400':
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'
