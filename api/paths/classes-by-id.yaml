get:
  operationId: getClassById
  summary: Get class by ID (role-scoped)
  security:
    - BearerAuth: []
  parameters:
    - name: classId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Class details
      content:
        application/json:
          schema:
            $ref: '../schemas/class.yaml'
    '401':
      description: Unauthorized or class not found
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'
put:
  operationId: updateClass
  summary: Update a class (ADMIN only)
  security:
    - BearerAuth: []
  parameters:
    - name: classId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    $ref: '../requestBodies/update-class.yaml'
  responses:
    '200':
      description: Class updated
      content:
        application/json:
          schema:
            $ref: '../schemas/class.yaml'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '../schemas/error-response.yaml'
