get:
  operationId: getClassById
  summary: Get class by ID (role-scoped)
  security:
    - BearerAuth: []
  parameters:
    - name: classId
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Class details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Class'
    '401':
      description: Unauthorized or class not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
put:
  operationId: updateClass
  summary: Update a class (ADMIN only)
  security:
    - BearerAuth: []
  parameters:
    - name: classId
      in: path
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/UpdateClassRequest'
  responses:
    '200':
      description: Class updated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Class'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
