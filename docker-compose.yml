services:
  api:
    build:
      context: .
      dockerfile: Dockerfile_local
    ports:
      - "8080:8080"
    volumes:
      - .:/go/src/app
    env_file:
      - .env
    restart: unless-stopped

  # MySQL service — only started with: docker compose --profile mysql up -d
  # Set DB_DRIVER=mysql in .env before using this profile.
  mysql:
    profiles: ["mysql"]
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-timetable}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
